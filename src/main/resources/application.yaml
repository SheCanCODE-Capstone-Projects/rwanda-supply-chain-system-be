spring:
  application:
    name: rwanda-supply-chain

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATABASE_URL}
    username: ${SPRING_DATABASE_USERNAME}
    password: ${SPRING_DATABASE_PASSWORD}

  jpa:
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: update

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  upload:
    dir: uploads/certifications

  alerts:
    recipient-emails: ${ALERT_RECIPIENT_EMAILS:}
    expiry-days-ahead: ${ALERT_EXPIRY_DAYS_AHEAD:14}
    low-stock-cron: ${ALERT_LOW_STOCK_CRON:0 0 7 * * *}
    expiry-cron: ${ALERT_EXPIRY_CRON:0 30 7 * * *}

  brevo:
    base-url: https://api.brevo.com/v3/smtp/email
    api-key: ${BREVO_API:}
    sender-email: ${BREVO_MAIL:no-reply@rwandasupplychain.com}
    sender-name: ${BREVO_SENDER_NAME:Rwanda Supply Chain}

server:
  port: 8082