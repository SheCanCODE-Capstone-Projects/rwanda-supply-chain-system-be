services:

  postgres:
    image: postgres:16
    container_name: supplychain-postgres
    environment:
      POSTGRES_DB: SupplyChainDatabase
      POSTGRES_USER: ${SPRING_DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${SPRING_DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRING_DATABASE_USERNAME:-postgres} -d SupplyChainDatabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: supplychain
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s

      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8082}:${PORT:-8082}"
    environment:

      SPRING_DATABASE_URL: jdbc:postgresql://postgres:5432/SupplyChainDatabase
      SPRING_DATABASE_USERNAME: ${SPRING_DATABASE_USERNAME:-postgres}
      SPRING_DATABASE_PASSWORD: ${SPRING_DATABASE_PASSWORD:-postgres}

      # JWT
      JWT_SECRET: ${JWT_SECRET}

      # Google OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}

      # Brevo email (matches: BREVO_API=${BREVO_API_KEY}, BREVO_MAIL=${BREVO_SENDER_EMAIL})
      BREVO_API_KEY: ${BREVO_API}
      BREVO_SENDER_EMAIL: ${BREVO_MAIL}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME}

      # Cloudinary file storage
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      PORT: ${PORT:-8082}

volumes:
  postgres_data: